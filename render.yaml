# =============================================================================
# Render Deployment Configuration
# =============================================================================
# Backend API service
# =============================================================================

services:
  - type: web
    name: shopsyy-backend
    env: node
    region: singapore
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: CLIENT_URL
        value: https://shopsyy.com
      - key: FIREBASE_SERVICE_ACCOUNT_PATH
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: CF_R2_ACCESS_KEY_ID
        sync: false
      - key: CF_R2_SECRET_ACCESS_KEY
        sync: false
      - key: CF_R2_BUCKET_NAME
        sync: false
      - key: CF_R2_ENDPOINT
        sync: false
      - key: CF_R2_PUBLIC_URL
        sync: false
      - key: SMS_PROVIDER
        value: console
      - key: MSG91_API_KEY
        sync: false
      - key: MSG91_TEMPLATE_ID
        sync: false
      - key: DELHIVERY_API_KEY
        sync: false
      - key: DELHIVERY_API_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
    rootDir: backend

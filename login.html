<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="auth-container">
        <!-- Logo -->
        <a href="index.html" style="display: block; margin-bottom: 20px;">
            <img src="logo.png" alt="Shopyng Logo" style="height: 50px; mix-blend-mode: multiply;">
        </a>
        <h1>Welcome to Shopyng</h1>
        
        <div class="auth-tabs">
            <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</div>
            <div class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</div>
        </div>

        <div class="auth-forms">
            <form id="login-form">
                <input type="email" id="login-email" placeholder="Email" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>

            <form id="signup-form" style="display: none;">
                <input type="text" id="signup-name" placeholder="Full Name" required>
                <input type="email" id="signup-email" placeholder="Email" required>
                <input type="password" id="signup-password" placeholder="Password" required>
                <button type="submit">Sign Up</button>
            </form>
        </div>

        <div class="google-login">
            <h2>Or continue with</h2>
            <button id="google-login-btn" style="padding: 12px 20px; font-size: 15px; font-weight: 600; cursor: pointer; border-radius: 12px; border: 1px solid var(--border-color); background: white; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; color: var(--text-dark);">
                <svg width="20" height="20" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4C12.955 4 4 12.955 4 24s8.955 20 20 20s20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="m6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4C16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.222 0-9.654-3.343-11.303-8l-6.57 4.819C9.656 39.663 16.318 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
                Google
            </button>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.getElementById('tab-login').classList.remove('active');
            document.getElementById('tab-signup').classList.remove('active');
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('signup-form').style.display = 'none';

            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById(tab + '-form').style.display = 'flex';
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDpNIflKnbAUujP1xnHJhgjCbid1ygkCaM",
            authDomain: "shopng-e9dcc.firebaseapp.com",
            projectId: "shopng-e9dcc",
            storageBucket: "shopng-e9dcc.firebasestorage.app",
            messagingSenderId: "885001620556",
            appId: "1:885001620556:web:f4f38abb6f4ea3e59138e9",
            measurementId: "G-MR76QPRYEW"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const name = document.getElementById('signup-name').value;
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                console.log("Signed up user:", userCredential.user);
                alert("Sign up successful!");
                window.location.href = "index.html";
            } catch (error) {
                console.error(error);
                alert(error.message);
            }
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                console.log("Logged in user:", userCredential.user);
                alert("Login successful!");
                window.location.href = "index.html";
            } catch (error) {
                console.error(error);
                alert(error.message);
            }
        });

        document.getElementById('google-login-btn').addEventListener('click', async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                console.log("Logged in with Google:", result.user);
                alert("Google Login successful!");
                window.location.href = "index.html";
            } catch (error) {
                console.error(error);
                alert(error.message);
            }
        });
    </script>
</body>
</html>
